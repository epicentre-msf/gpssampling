name: pkgdown

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libsqlite3-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev \
            libtiff-dev \
            libjpeg-dev

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to doc branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: doc
          folder: docs
          clean: true

      - name: Enable GitHub Pages on doc branch
        run: |
          gh api repos/${{ github.repository }}/pages --method POST \
            --input - <<'EOF' || true
          {"build_type":"legacy","source":{"branch":"doc","path":"/"}}
          EOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
